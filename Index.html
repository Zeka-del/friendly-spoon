            font-family: system-ui, -apple-system, sans-serif;
            background: #0d1117;
            color: #e6edf3;

        }
        .card {
            background: #161b22;
            padding: 2.5rem;

            max-width: 420px;

            border-radius: 40px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(35, 134, 54, 0.4);

            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #2ea043;
            transform: scale(1.02);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .info {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #8b949e;
        }
        .info a {
            color: #58a6ff;
            text-decoration: none;
        }
        .info a:hover {
            text-decoration: underline;
